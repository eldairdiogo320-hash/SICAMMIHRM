<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avisos de Vacinas Pendentes | Sistema de Vacinação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
      margin: 0;
      padding: 0;
      font-family: 'Times New Roman', Times, serif;
    }
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f8f9fa;
        }
        .card {
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .btn-primary {
            background-color: #2c8d4d;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <h1 class="text-center mb-4">🔔 Avisos sobre Vacinas Pendentes</h1>
        
        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Enviar Aviso</h5>
            </div>
            <div class="card-body">
                <form>
                    <div class="mb-3">
                        <label class="form-label">Pacientes com vacinas pendentes</label>
                        <select class="form-select" multiple>
                            <option>João da Silva (Poliomielite - 2ª Dose)</option>
                            <option>Maria Oliveira (Pentavalente - 1ª Dose)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mensagem</label>
                        <textarea class="form-control" rows="4">Prezado responsável,

Lembramos que há vacinas pendentes no calendário de imunização.

Atenciosamente,
Equipe de Saúde</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Meio de envio</label>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" checked>
                            <label class="form-check-label">WhatsApp</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox">
                            <label class="form-check-label">SMS</label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Enviar Avisos</button>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Histórico de Envios</h5>
            </div>
            <div class="card-body">
                <ul class="list-group">
                    <li class="list-group-item">
                        <strong>10/05/2023</strong> - João da Silva (WhatsApp)
                    </li>
                    <li class="list-group-item">
                        <strong>05/05/2023</strong> - Maria Oliveira (WhatsApp)
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
