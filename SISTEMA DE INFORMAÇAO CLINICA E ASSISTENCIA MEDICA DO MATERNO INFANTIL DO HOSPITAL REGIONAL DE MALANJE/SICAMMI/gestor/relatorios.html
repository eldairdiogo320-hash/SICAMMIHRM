<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios de Cobertura | Sistema de Vacinação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f8f9fa;
        }
        .card {
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <h1 class="text-center mb-4">📊 Relatórios de Cobertura Vacinal</h1>
        
        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Filtros</h5>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Período</label>
                        <select class="form-select">
                            <option>Últimos 30 dias</option>
                            <option>Últimos 90 dias</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Vacina</label>
                        <select class="form-select">
                            <option>Todas</option>
                            <option>BCG</option>
                            <option>Poliomielite</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Região</label>
                        <select class="form-select">
                            <option>Todas</option>
                            <option>Zona Norte</option>
                            <option>Zona Sul</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Cobertura Vacinal (%)</h5>
            </div>
            <div class="card-body">
                <canvas id="coberturaChart"></canvas>
            </div>
        </div>

        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Dados Detalhados</h5>
            </div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Vacina</th>
                            <th>Meta</th>
                            <th>Atingido</th>
                            <th>Cobertura</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>BCG</td>
                            <td>100</td>
                            <td>98</td>
                            <td>98%</td>
                        </tr>
                        <tr>
                            <td>Poliomielite</td>
                            <td>100</td>
                            <td>89</td>
                            <td>89%</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const ctx = document.getElementById('coberturaChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['BCG', 'Poliomielite', 'Hepatite B'],
                datasets: [{
                    label: 'Cobertura (%)',
                    data: [98, 89, 95],
                    backgroundColor: ['#2c8d4d', '#2c8d4d', '#2c8d4d']
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100
                    }
                }
            }
        });
    </script>
</body>
</html>
