<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplicação e Registro de Vacinas | Sistema de Vacinação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
      margin: 0;
      padding: 0;
      font-family: 'Times New Roman', Times, serif;
    }
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f8f9fa;
        }
        .card {
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .btn-primary {
            background-color: #2c8d4d;
            border: none;
        }
        .btn-primary:hover {
            background-color: #237a43;
        }
        .table-responsive {
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <h1 class="text-center mb-4">💉 Aplicação e Registro de Vacinas</h1>
        
        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Formulário de Vacinação</h5>
            </div>
            <div class="card-body">
                <form id="formVacina">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="paciente" class="form-label">Paciente</label>
                            <select class="form-select" id="paciente" required>
                                <option value="" selected disabled>Selecione...</option>
                                <option>João da Silva (2 anos)</option>
                                <option>Maria Oliveira (6 meses)</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="vacina" class="form-label">Vacina</label>
                            <select class="form-select" id="vacina" required>
                                <option value="" selected disabled>Selecione...</option>
                                <option>BCG</option>
                                <option>Hepatite B</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="dose" class="form-label">Dose</label>
                            <select class="form-select" id="dose" required>
                                <option value="" selected disabled>Selecione...</option>
                                <option>1ª Dose</option>
                                <option>2ª Dose</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="data" class="form-label">Data</label>
                            <input type="date" class="form-control" id="data" required>
                        </div>
                        <div class="col-md-4">
                            <label for="lote" class="form-label">Lote</label>
                            <input type="text" class="form-control" id="lote" required>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary">Registrar Vacina</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Histórico de Aplicações</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Paciente</th>
                                <th>Vacina</th>
                                <th>Dose</th>
                                <th>Lote</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>10/05/2023</td>
                                <td>João da Silva</td>
                                <td>Poliomielite</td>
                                <td>2ª Dose</td>
                                <td>BR12345</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('formVacina').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Vacina registrada com sucesso!');
            this.reset();
        });
    </script>
</body>
</html>
