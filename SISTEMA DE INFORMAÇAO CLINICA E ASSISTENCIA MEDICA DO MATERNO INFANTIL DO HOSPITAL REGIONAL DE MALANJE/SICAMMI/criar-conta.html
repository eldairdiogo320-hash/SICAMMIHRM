<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema Clínico Materno-Infantil · Cadastro</title>
    <!-- Bootstrap 5 + Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Times New Roman', Times, serif;
        }

        :root {
            --primary: #1a6e9a;
            --primary-light: #4fa3d1;
            --bg-glass: rgba(255, 255, 255, 0.75);
            --border-glass: rgba(255, 255, 255, 0.25);
            --shadow-glass: 0 8px 32px rgba(31, 38, 135, 0.12);
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('images/login-sicammi.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            padding: 20px;
        }

        /* Wrapper principal com efeito vidro */
        .register-wrapper {
            max-width: 1000px;
            width: 100%;
            display: flex;
            gap: 24px;
            align-items: stretch;
        }

        /* Painel esquerdo — conteúdo institucional */
        .left-panel {
            flex: 0 0 280px;
            background: rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 30px 20px;
            border: 1px solid var(--border-glass);
            box-shadow: var(--shadow-glass);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #fff;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
            min-height: 480px;
        }

        .left-panel img {
            max-width: 140px;
            height: auto;
            margin-bottom: 20px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px;
            backdrop-filter: blur(4px);
        }

        .left-panel .mensagem i {
            font-size: 2.8rem;
            display: block;
            margin-bottom: 12px;
            color: #ffe484;
        }

        .left-panel .mensagem strong {
            font-size: 1.2rem;
            display: block;
            margin-bottom: 6px;
        }

        .left-panel .mensagem {
            font-size: 1rem;
            line-height: 1.6;
            font-weight: 400;
        }

        /* Container do formulário (vidro) */
        .register-container {
            flex: 1;
            background: var(--bg-glass);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 24px;
            border: 1px solid var(--border-glass);
            box-shadow: var(--shadow-glass);
            overflow: hidden;
            padding: 0;
            transition: all 0.2s ease;
        }

        .register-header {
            background: rgba(26, 110, 154, 0.80);
            backdrop-filter: blur(4px);
            padding: 20px 24px;
            color: white;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.10);
        }

        .register-header img {
            height: 48px;
            width: auto;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }

        .register-header h4 {
            margin: 0;
            font-weight: 600;
            letter-spacing: 0.3px;
            font-size: 1.25rem;
        }

        .register-body {
            padding: 28px 30px;
        }

        .form-label {
            font-weight: 500;
            font-size: 0.9rem;
            color: #1f3a4b;
        }

        .form-control,
        .form-select {
            border-radius: 10px;
            padding: 10px 14px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            background: rgba(255, 255, 255, 0.60);
            backdrop-filter: blur(4px);
            transition: 0.2s;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 0.25rem rgba(79, 163, 209, 0.25);
            background: rgba(255, 255, 255, 0.85);
        }

        .input-group-icon {
            position: relative;
        }

        .input-group-icon .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #6c7a8a;
            transition: 0.2s;
            z-index: 5;
        }

        .input-group-icon .password-toggle:hover {
            color: var(--primary);
        }

        /* Barra de força da senha */
        .password-strength-wrapper {
            margin-top: 8px;
        }

        .password-strength-bar {
            height: 6px;
            border-radius: 12px;
            background: #e9ecef;
            overflow: hidden;
            transition: 0.25s ease;
        }

        .password-strength-bar .strength-fill {
            height: 100%;
            width: 0%;
            border-radius: 12px;
            transition: width 0.35s ease, background 0.3s ease;
        }

        .strength-text {
            font-size: 0.75rem;
            font-weight: 500;
            margin-top: 4px;
            min-height: 20px;
            color: #495057;
        }

        .strength-text.weak {
            color: #dc3545;
        }
        .strength-text.medium {
            color: #f0b400;
        }
        .strength-text.strong {
            color: #198754;
        }

        .btn-register {
            background: linear-gradient(135deg, #198754, #2b9d6e);
            border: none;
            padding: 12px 18px;
            font-weight: 600;
            width: 100%;
            border-radius: 12px;
            color: white;
            transition: 0.25s ease;
            letter-spacing: 0.4px;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(25, 135, 84, 0.30);
            background: linear-gradient(135deg, #157347, #218c5e);
            color: white;
        }

        .back-to-login {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .back-to-login:hover {
            text-decoration: underline;
            color: #0d4b6b;
        }

        .terms-check .form-check-input:checked {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        .terms-check a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .terms-check a:hover {
            text-decoration: underline;
        }

        /* Responsividade */
        @media (max-width: 820px) {
            .register-wrapper {
                flex-direction: column;
                max-width: 560px;
            }

            .left-panel {
                flex: 0 0 auto;
                min-height: 140px;
                flex-direction: row;
                padding: 20px 24px;
                gap: 20px;
                text-align: left;
                justify-content: flex-start;
            }

            .left-panel img {
                max-width: 80px;
                margin-bottom: 0;
            }

            .left-panel .mensagem i {
                font-size: 1.8rem;
                display: inline-block;
                margin-right: 10px;
                margin-bottom: 0;
            }

            .left-panel .mensagem strong {
                display: inline;
                font-size: 1rem;
            }

            .left-panel .mensagem br {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .register-body {
                padding: 20px 16px;
            }
            .register-header {
                padding: 14px 16px;
                flex-wrap: wrap;
            }
            .register-header h4 {
                font-size: 1rem;
            }
            .left-panel {
                flex-wrap: wrap;
                justify-content: center;
                text-align: center;
                gap: 12px;
            }
            .left-panel .mensagem i {
                display: block;
                margin-right: 0;
            }
        }

        /* Small extras */
        .cursor-glow {
            pointer-events: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            mix-blend-mode: difference;
        }

        .cursor-dot,
        .cursor-ring {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: none;
        }

        .cursor-dot {
            width: 8px;
            height: 8px;
            background: #ff6b6b;
            z-index: 10000;
        }

        .cursor-ring {
            width: 34px;
            height: 34px;
            border: 2.5px solid #ff6b6b;
            z-index: 9999;
            opacity: 0.6;
            transition: width 0.2s, height 0.2s, border-color 0.2s;
        }
    </style>
</head>
<body>

    <div class="register-wrapper">
        <!-- Painel esquerdo -->
        <div class="left-panel">
            <img src="images/register-afrique.png" alt="Sistema Materno-Infantil" />
            <div class="mensagem">
                <i class="fas fa-hand-holding-heart"></i>
                <strong>Cuidar da saúde materno-infantil</strong><br>
                é construir um futuro mais forte.
            </div>
        </div>

        <!-- Painel direito: formulário de cadastro -->
        <div class="register-container">
            <div class="register-header">
                <img src="images/materno_infantil_bg.png" alt="Logo" />
                <h4><i class="fas fa-user-plus me-2"></i>Criar Nova Conta</h4>
            </div>
            <div class="register-body">
                <form id="registerForm" novalidate>
                    <!-- Nome completo -->
                    <div class="mb-3">
                        <label for="registerName" class="form-label"><i class="far fa-user me-1"></i>Nome Completo</label>
                        <input type="text" class="form-control" id="registerName" placeholder="Ex: Maria da Silva" required />
                    </div>

                    <!-- E-mail -->
                    <div class="mb-3">
                        <label for="registerEmail" class="form-label"><i class="far fa-envelope me-1"></i>E-mail institucional</label>
                        <input type="email" class="form-control" id="registerEmail" placeholder="seu@email.com" required />
                    </div>

                    <!-- CPF -->
                    <div class="mb-3">
                        <label for="registerCPF" class="form-label"><i class="fas fa-id-card me-1"></i>CPF</label>
                        <input type="text" class="form-control" id="registerCPF" placeholder="000.000.000-00" required />
                    </div>

                    <!-- Perfil -->
                    <div class="mb-3">
                        <label for="registerProfile" class="form-label"><i class="fas fa-briefcase me-1"></i>Perfil</label>
                        <select class="form-select" id="registerProfile" required>
                            <option value="" selected disabled>Selecione seu perfil</option>
                            <option value="medico">Médico</option>
                            <option value="enfermeiro">Enfermeiro</option>
                            <option value="tecnico">Técnico de Enfermagem</option>
                            <option value="administrativo">Administrativo</option>
                            <option value="agente">Agente de Vacinação</option>
                            <option value="recepcionista">Recepcionista / Atendimento</option>
                            <option value="directores">Diretor / Coordenador</option>
                        </select>
                    </div>

                    <!-- Senha com medidor de força -->
                    <div class="mb-3">
                        <label for="registerPassword" class="form-label"><i class="fas fa-lock me-1"></i>Senha</label>
                        <div class="input-group-icon">
                            <input type="password" class="form-control" id="registerPassword" placeholder="Crie uma senha forte" required />
                            <i class="fas fa-eye password-toggle" id="toggleRegisterPassword"></i>
                        </div>
                        <!-- Medidor de força -->
                        <div class="password-strength-wrapper">
                            <div class="password-strength-bar">
                                <div class="strength-fill" id="strengthFill"></div>
                            </div>
                            <div class="strength-text" id="strengthText"> </div>
                        </div>
                    </div>

                    <!-- Confirmar senha -->
                    <div class="mb-3">
                        <label for="registerConfirmPassword" class="form-label"><i class="fas fa-check-circle me-1"></i>Confirmar Senha</label>
                        <div class="input-group-icon">
                            <input type="password" class="form-control" id="registerConfirmPassword" placeholder="Digite novamente" required />
                            <i class="fas fa-eye password-toggle" id="toggleConfirmPassword"></i>
                        </div>
                    </div>

                    <!-- Termos -->
                    <div class="terms-check mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="termsCheck" required />
                            <label class="form-check-label" for="termsCheck">
                                Li e concordo com os <a href="termos.html">Termos de Uso</a> e <a href="politica-rivacidade.html">Política de Privacidade</a>
                            </label>
                        </div>
                    </div>

                    <!-- Botão criar conta -->
                    <button type="submit" class="btn btn-register mb-3">
                        <i class="fas fa-user-plus me-2"></i>CRIAR CONTA
                    </button>

                    <!-- Voltar ao login -->
                    <div class="text-center">
                        <a href="login.html" class="back-to-login" id="backToLogin">
                            <i class="fas fa-arrow-left me-1"></i> Voltar para o Login
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Cursor personalizado (opcional, apenas estético) -->
    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <!-- Bootstrap JS (para funcionalidades extras) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {

            // ========== 1. TOGGLE DE VISIBILIDADE DAS SENHAS ==========
            const toggleRegister = document.getElementById('toggleRegisterPassword');
            const registerPass = document.getElementById('registerPassword');
            toggleRegister.addEventListener('click', function() {
                const type = registerPass.getAttribute('type') === 'password' ? 'text' : 'password';
                registerPass.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });

            const toggleConfirm = document.getElementById('toggleConfirmPassword');
            const confirmPass = document.getElementById('registerConfirmPassword');
            toggleConfirm.addEventListener('click', function() {
                const type = confirmPass.getAttribute('type') === 'password' ? 'text' : 'password';
                confirmPass.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });

            // ========== 2. MEDIDOR DE FORÇA DA SENHA ==========
            const strengthFill = document.getElementById('strengthFill');
            const strengthText = document.getElementById('strengthText');

            function evaluateStrength(password) {
                let score = 0;
                if (password.length >= 8) score++;
                if (/[a-z]/.test(password) && /[A-Z]/.test(password)) score++;
                if (/\d/.test(password)) score++;
                if (/[^a-zA-Z0-9]/.test(password)) score++;
                if (password.length >= 12) score++;

                let level = { width: '0%', label: '', class: '' };
                if (password.length === 0) {
                    level = { width: '0%', label: ' ', class: '' };
                } else if (score <= 2) {
                    level = { width: '30%', label: 'Fraca', class: 'weak' };
                } else if (score <= 4) {
                    level = { width: '65%', label: 'Média', class: 'medium' };
                } else {
                    level = { width: '100%', label: 'Forte', class: 'strong' };
                }
                return level;
            }

            registerPass.addEventListener('input', function() {
                const pwd = this.value;
                const result = evaluateStrength(pwd);
                strengthFill.style.width = result.width;
                strengthFill.style.background = result.class === 'weak' ? '#dc3545' :
                    result.class === 'medium' ? '#f0b400' :
                    result.class === 'strong' ? '#198754' : '#e9ecef';
                strengthText.textContent = result.label;
                strengthText.className = 'strength-text ' + result.class;
                if (pwd.length === 0) {
                    strengthText.textContent = ' ';
                    strengthText.className = 'strength-text';
                }
            });

            // ========== 3. SUBMISSÃO DO FORMULÁRIO ==========
            const registerForm = document.getElementById('registerForm');
            registerForm.addEventListener('submit', function(e) {
                e.preventDefault();

                // Coletar dados
                const name = document.getElementById('registerName').value.trim();
                const email = document.getElementById('registerEmail').value.trim();
                const cpf = document.getElementById('registerCPF').value.trim();
                const profile = document.getElementById('registerProfile').value;
                const password = document.getElementById('registerPassword').value;
                const confirm = document.getElementById('registerConfirmPassword').value;
                const terms = document.getElementById('termsCheck').checked;

                // Validações básicas
                if (!name || !email || !cpf || !profile || !password || !confirm) {
                    alert('Por favor, preencha todos os campos obrigatórios.');
                    return;
                }
                if (password !== confirm) {
                    alert('As senhas não coincidem. Verifique.');
                    return;
                }
                if (password.length < 8) {
                    alert('A senha deve ter pelo menos 8 caracteres.');
                    return;
                }
                if (!terms) {
                    alert('Você precisa concordar com os Termos de Uso e Política de Privacidade.');
                    return;
                }

                // Simular envio (loading)
                const btn = registerForm.querySelector('.btn-register');
                const originalHtml = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> CRIANDO...';
                btn.disabled = true;

                setTimeout(() => {
                    btn.innerHTML = originalHtml;
                    btn.disabled = false;
                    alert('✅ Conta criada com sucesso! Agora faça o login.');
                    // Redirecionar para login (simulação)
                    window.location.href = 'login.html'; // ou index.html
                }, 1800);
            });

            // ========== 4. NAVEGAÇÃO: VOLTAR PARA LOGIN ==========
            document.getElementById('backToLogin').addEventListener('click', function(e) {
                e.preventDefault();
                // Redirecionar para a página de login (ajuste conforme seu projeto)
                window.location.href = 'login.html';
            });

            // ========== 5. TERMOS E POLÍTICA (popup) ==========
            document.getElementById('termsLink').addEventListener('click', function(e) {
                e.preventDefault();
                alert('📜 Termos de Uso\n\n• Uso exclusivo para profissionais de saúde.\n• Dados confidenciais protegidos por lei.\n• Uso indevido sujeito a penalidades.');
            });
            document.getElementById('privacyLink').addEventListener('click', function(e) {
                e.preventDefault();
                alert('🔒 Política de Privacidade\n\n• Seus dados são protegidos conforme LGPD.\n• Utilizados exclusivamente para fins de saúde.\n• Você pode solicitar exclusão a qualquer momento.');
            });

            // ========== 6. CURSOR PERSONALIZADO (opcional) ==========
            const dot = document.getElementById('cursorDot');
            const ring = document.getElementById('cursorRing');
            let mouseX = 0,
                mouseY = 0,
                ringX = 0,
                ringY = 0;

            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                dot.style.left = mouseX + 'px';
                dot.style.top = mouseY + 'px';
            });

            function animateRing() {
                ringX += (mouseX - ringX) * 0.12;
                ringY += (mouseY - ringY) * 0.12;
                ring.style.left = ringX + 'px';
                ring.style.top = ringY + 'px';
                requestAnimationFrame(animateRing);
            }
            animateRing();

            // Esconder cursor customizado em dispositivos touch
            if ('ontouchstart' in window) {
                dot.style.display = 'none';
                ring.style.display = 'none';
            }

        });
    </script>
</body>
</html>
