<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema Clínico Materno-Infantil - Logout</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Font Awesome para ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      font-family: 'Times New Roman', Times, serif;
    }

    :root {
      --primary-color: #1a6e9a;
      --secondary-color: #4fa3d1;
      --accent-color: #f8f9fa;
      --text-color: #333;
      --light-gray: #f5f5f5;
      --danger-color: #dc3545;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--light-gray);
      color: var(--text-color);
      height: 100vh;
      display: flex;
      align-items: center;
      
      /* IMAGEM DE FUNDO ADICIONADA */
      background-image: url('images/login-sicammi.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    .logout-wrapper {
      display: flex;
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
      padding: 20px;
      gap: 20px;
    }

    /* Painel esquerdo - vidro transparente */
    .left-panel {
      flex: 0 0 300px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 10px;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
      min-height: 500px;
    }

    .left-panel img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .left-panel .mensagem {
      color: white;
      text-align: center;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .left-panel .mensagem i {
      font-size: 2rem;
      margin-bottom: 10px;
      display: block;
    }

    .logout-container {
      flex: 1;
      margin: 0;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 10px;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 500px;
    }

    .logout-header {
      background: rgba(26, 110, 154, 0.9);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      color: white;
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logout-header img {
      height: 60px;
      margin-bottom: 10px;
    }

    .logout-body {
      padding: 40px 30px;
      text-align: center;
    }

    .logout-icon {
      font-size: 5rem;
      color: var(--primary-color);
      margin-bottom: 20px;
      animation: fadeInDown 0.8s ease;
    }

    .logout-title {
      color: var(--primary-color);
      font-weight: 700;
      margin-bottom: 15px;
      font-size: 2rem;
    }

    .logout-message {
      color: #555;
      font-size: 1.1rem;
      margin-bottom: 30px;
    }

    .countdown-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin: 30px 0;
    }

    .countdown-circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 2.8rem;
      font-weight: 700;
      box-shadow: 0 4px 20px rgba(26, 110, 154, 0.3);
      animation: pulse 1s infinite ease-in-out;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .countdown-text {
      color: #666;
      font-size: 1rem;
    }

    .btn-redirect {
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      border: none;
      padding: 12px 40px;
      font-weight: 600;
      border-radius: 5px;
      transition: all 0.3s ease;
      color: white;
      text-decoration: none;
      display: inline-block;
      margin-top: 20px;
    }

    .btn-redirect:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(26, 110, 154, 0.3);
      background: linear-gradient(135deg, #145a83, #3d8eb8);
      color: white;
    }

    .user-info {
      background: rgba(245, 245, 245, 0.7);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      padding: 15px 20px;
      border-radius: 8px;
      margin: 20px auto;
      max-width: 400px;
      border: 1px solid rgba(221, 221, 221, 0.3);
      display: inline-block;
    }

    .user-info i {
      color: var(--primary-color);
      margin-right: 10px;
    }

    .user-info .user-name {
      font-weight: 600;
      color: var(--primary-color);
    }

    .user-info .user-profile {
      color: #666;
      font-size: 0.9rem;
    }

    .progress-bar-container {
      max-width: 400px;
      margin: 20px auto;
      height: 4px;
      background: rgba(221, 221, 221, 0.5);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
      border-radius: 2px;
      transition: width 0.5s linear;
      width: 100%;
    }

    @keyframes fadeInDown {
      0% {
        opacity: 0;
        transform: translateY(-20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .logout-wrapper {
        flex-direction: column;
        padding: 10px;
      }

      .left-panel {
        flex: 0 0 auto;
        min-height: 150px;
        padding: 20px;
        flex-direction: row;
        gap: 20px;
      }

      .left-panel img {
        max-width: 80px;
        margin-bottom: 0;
      }

      .left-panel .mensagem {
        font-size: 0.9rem;
        text-align: left;
      }

      .left-panel .mensagem i {
        font-size: 1.5rem;
        margin-bottom: 5px;
        display: inline-block;
        margin-right: 10px;
      }

      .logout-container {
        min-height: 400px;
      }

      .logout-body {
        padding: 30px 20px;
      }

      .countdown-circle {
        width: 80px;
        height: 80px;
        font-size: 2.2rem;
      }
    }

    @media (max-width: 576px) {
      .logout-body {
        padding: 20px 15px;
      }

      .left-panel {
        flex-direction: column;
        text-align: center;
        min-height: 120px;
      }

      .left-panel .mensagem {
        text-align: center;
      }

      .logout-icon {
        font-size: 3.5rem;
      }

      .logout-title {
        font-size: 1.5rem;
      }

      .countdown-circle {
        width: 70px;
        height: 70px;
        font-size: 1.8rem;
      }
    }

    /* Cursor personalizado com trailing */
    .custom-cursor {
      pointer-events: none;
      z-index: 9999;
    }

    .dot, .ring {
      position: fixed;
      top: 0;
      left: 0;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: red;
      border-radius: 50%;
      z-index: 10000;
    }

    .ring {
      width: 32px;
      height: 32px;
      border: 3px solid red;
      border-radius: 50%;
      z-index: 9999;
      animation: pulseCursor 1.4s infinite ease-out;
    }

    @keyframes pulseCursor {
      0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
      70% {
        transform: translate(-50%, -50%) scale(1.5);
        opacity: 0;
      }
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="logout-wrapper">
    <!-- Painel esquerdo com imagem -->
    <div class="left-panel">
      <img src="images/log-afrique.png" alt="Sistema Materno-Infantil" />
      <div class="mensagem">
        <i class="fas fa-heartbeat"></i>
        <strong>Lembre-se:</strong><br>
        Cuidar da saúde materno-infantil<br>
        é construir um futuro melhor.
      </div>
    </div>

    <!-- Container de Logout -->
    <div class="logout-container">
      <div class="logout-header">
        <img src="images/materno_infantil_bg.png" alt="Logo do Sistema" class="img-fluid" />
        <h4>Sistema Clínico Materno-Infantil</h4>
      </div>
      <div class="logout-body">
        <div class="logout-icon">
          <i class="fas fa-sign-out-alt"></i>
        </div>
        <h2 class="logout-title">Sessão Encerrada</h2>
        <p class="logout-message">
          Você foi desconectado com sucesso do sistema.
        </p>

        <div class="user-info">
          <i class="fas fa-user-circle"></i>
          <span class="user-name" id="userNameDisplay">Usuário</span>
          <span class="user-profile" id="userProfileDisplay">(Perfil)</span>
        </div>

        <p class="countdown-text">
          <i class="fas fa-clock"></i> Redirecionando para a tela de login em:
        </p>

        <div class="countdown-container">
          <div class="countdown-circle" id="countdownNumber">10</div>
        </div>

        <div class="progress-bar-container">
          <div class="progress-bar-fill" id="progressBar"></div>
        </div>

        <a href="login.html" class="btn-redirect">
          <i class="fas fa-arrow-right"></i> Ir para Login Agora
        </a>
      </div>
    </div>
  </div>

  <!-- Cursor personalizado -->
  <div class="custom-cursor">
    <div class="ring"></div>
    <div class="dot"></div>
  </div>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // ====== INFORMAÇÕES DO USUÁRIO (SIMULADAS) ======
      // Em um cenário real, estes dados viriam da sessão ou do localStorage
      const userData = {
        name: sessionStorage.getItem('userName') || 'Dr. João Silva',
        profile: sessionStorage.getItem('userProfile') || 'Médico'
      };

      // Exibir nome do usuário
      document.getElementById('userNameDisplay').textContent = userData.name;
      document.getElementById('userProfileDisplay').textContent = `(${userData.profile})`;

      // ====== CONTAGEM REGRESSIVA DE 10 SEGUNDOS ======
      let countdown = 10;
      const countdownElement = document.getElementById('countdownNumber');
      const progressBar = document.getElementById('progressBar');

      function updateCountdown() {
        countdownElement.textContent = countdown;
        progressBar.style.width = `${(countdown / 10) * 100}%`;

        if (countdown === 0) {
          // Redirecionar para a página de login
          window.location.href = 'login.html';
        } else {
          countdown--;
          setTimeout(updateCountdown, 1000);
        }
      }

      // Iniciar contagem regressiva
      setTimeout(updateCountdown, 1000);

      // ====== LIMPAR DADOS DA SESSÃO ======
      // Remover dados do usuário da sessão ao fazer logout
      sessionStorage.removeItem('currentUser');
      sessionStorage.removeItem('userName');
      sessionStorage.removeItem('userProfile');

      // ====== CURSOR COM RASTRO SUAVE ======
      const dot = document.querySelector(".dot");
      const ring = document.querySelector(".ring");
      let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;

      document.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        dot.style.left = `${mouseX}px`;
        dot.style.top = `${mouseY}px`;
      });

      function animateRing() {
        ringX += (mouseX - ringX) * 0.15;
        ringY += (mouseY - ringY) * 0.15;
        ring.style.left = `${ringX}px`;
        ring.style.top = `${ringY}px`;
        requestAnimationFrame(animateRing);
      }

      animateRing();
    });
  </script>
</body>
</html>
