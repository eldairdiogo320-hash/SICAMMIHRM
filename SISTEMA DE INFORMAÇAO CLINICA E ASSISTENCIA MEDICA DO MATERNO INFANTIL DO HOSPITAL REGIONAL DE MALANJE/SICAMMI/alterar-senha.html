<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema Clínico Materno-Infantil - Alterar Senha</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Font Awesome para ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      font-family: 'Times New Roman', Times, serif;
    }

    :root {
      --primary-color: #1a6e9a;
      --secondary-color: #4fa3d1;
      --accent-color: #f8f9fa;
      --text-color: #333;
      --light-gray: #f5f5f5;
      --danger-color: #dc3545;
      --weak-color: #ff4757;
      --medium-color: #ffa502;
      --strong-color: #2ed573;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--light-gray);
      color: var(--text-color);
      height: 100vh;
      display: flex;
      align-items: center;
      background-image: url('images/login-sicammi.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    .login-wrapper {
      display: flex;
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
      padding: 20px;
      gap: 20px;
    }

    .left-panel {
      flex: 0 0 300px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 10px;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
      min-height: 500px;
    }

    .left-panel img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .left-panel .mensagem {
      color: white;
      text-align: center;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .left-panel .mensagem i {
      font-size: 2rem;
      margin-bottom: 10px;
      display: block;
    }

    .login-container {
      flex: 1;
      margin: 0;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 10px;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .login-header {
      background: rgba(26, 110, 154, 0.9);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      color: white;
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .login-header img {
      height: 60px;
      margin-bottom: 10px;
    }

    .login-body {
      padding: 30px;
    }

    .form-control {
      border-radius: 5px;
      padding: 12px;
      border: 1px solid rgba(221, 221, 221, 0.5);
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }

    .form-control:focus {
      border-color: var(--secondary-color);
      box-shadow: 0 0 0 0.25rem rgba(31, 138, 194, 0.25);
      background: rgba(255, 255, 255, 0.9);
    }

    .btn-login {
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      border: none;
      padding: 12px;
      font-weight: 600;
      width: 100%;
      border-radius: 5px;
      transition: all 0.3s ease;
      color: white;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(26, 110, 154, 0.3);
      background: linear-gradient(135deg, #145a83, #3d8eb8);
    }

    .password-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #777;
    }

    .password-toggle:hover {
      color: var(--primary-color);
    }

    .language-selector {
      position: absolute;
      top: 15px;
      right: 15px;
    }

    .links-section {
      margin-top: 20px;
      text-align: center;
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .links-section a {
      color: var(--primary-color);
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      padding: 5px 10px;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }

    .links-section a:hover {
      text-decoration: underline;
      background: rgba(255, 255, 255, 0.8);
      transform: scale(1.05);
    }

    /* Medidor de Força da Senha */
    .password-strength {
      margin-top: 8px;
      margin-bottom: 15px;
    }

    .strength-bar {
      height: 6px;
      background: #e0e0e0;
      border-radius: 3px;
      overflow: hidden;
      margin-top: 5px;
    }

    .strength-bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 3px;
      transition: all 0.3s ease;
    }

    .strength-text {
      font-size: 0.8rem;
      margin-top: 3px;
      display: flex;
      justify-content: space-between;
    }

    .strength-text .status {
      font-weight: 600;
    }

    .strength-requirements {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 5px;
    }

    .requirement {
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 12px;
      background: rgba(0,0,0,0.05);
      color: #888;
      transition: all 0.3s ease;
    }

    .requirement.met {
      background: rgba(46, 213, 115, 0.2);
      color: #2ed573;
    }

    .requirement i {
      margin-right: 3px;
    }

    /* Classes de força */
    .strength-weak .strength-bar-fill { background: var(--weak-color); width: 25%; }
    .strength-medium .strength-bar-fill { background: var(--medium-color); width: 50%; }
    .strength-strong .strength-bar-fill { background: var(--strong-color); width: 75%; }
    .strength-very-strong .strength-bar-fill { background: #1e90ff; width: 100%; }

    .strength-weak .status { color: var(--weak-color); }
    .strength-medium .status { color: var(--medium-color); }
    .strength-strong .status { color: var(--strong-color); }
    .strength-very-strong .status { color: #1e90ff; }

    .captcha-container {
      background: rgba(245, 245, 245, 0.7);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      border: 1px solid rgba(221, 221, 221, 0.3);
    }

    .captcha-container input {
      margin-right: 10px;
    }

    .back-link {
      display: inline-block;
      margin-top: 10px;
      color: var(--primary-color);
      text-decoration: none;
      font-size: 0.9rem;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .login-wrapper {
        flex-direction: column;
        padding: 10px;
      }

      .left-panel {
        flex: 0 0 auto;
        min-height: 150px;
        padding: 20px;
        flex-direction: row;
        gap: 20px;
      }

      .left-panel img {
        max-width: 80px;
        margin-bottom: 0;
      }

      .left-panel .mensagem {
        font-size: 0.9rem;
        text-align: left;
      }

      .left-panel .mensagem i {
        font-size: 1.5rem;
        margin-bottom: 5px;
        display: inline-block;
        margin-right: 10px;
      }

      .login-container {
        margin: 0;
      }
    }

    @media (max-width: 576px) {
      .login-container {
        margin: 0;
      }

      .login-body {
        padding: 20px;
      }

      .left-panel {
        flex-direction: column;
        text-align: center;
        min-height: 120px;
      }

      .left-panel .mensagem {
        text-align: center;
      }

      .links-section {
        gap: 10px;
      }
    }

    .custom-cursor {
      pointer-events: none;
      z-index: 9999;
    }

    .dot, .ring {
      position: fixed;
      top: 0;
      left: 0;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: red;
      border-radius: 50%;
      z-index: 10000;
    }

    .ring {
      width: 32px;
      height: 32px;
      border: 3px solid red;
      border-radius: 50%;
      z-index: 9999;
      animation: pulse 1.4s infinite ease-out;
    }

    @keyframes pulse {
      0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
      70% {
        transform: translate(-50%, -50%) scale(1.5);
        opacity: 0;
      }
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <!-- Painel esquerdo com imagem -->
    <div class="left-panel">
      <img src="images/alterar-senha.png" alt="Sistema Materno-Infantil" />
      <div class="mensagem">
        <i class="fas fa-lock"></i>
        <strong>Altere sua Senha</strong><br>
        Crie uma senha forte e segura<br>
        para proteger seus dados.
      </div>
    </div>

    <!-- Container de Alterar Senha -->
    <div class="login-container">
      <div class="login-header">
        <img src="images/materno_infantil_bg.png" alt="Logo do Sistema" class="img-fluid" />
        <h4>Alterar Senha</h4>
      </div>
      <div class="login-body">
        <div class="language-selector">
          <select class="form-select form-select-sm" id="language-selector">
            <option value="pt">🇧🇷 Português</option>
            <option value="es">🇪🇸 Español</option>
            <option value="en">🇬🇧 English</option>
          </select>
        </div>
        <form id="changePasswordForm">
          <!-- Senha Atual -->
          <div class="mb-3 position-relative">
            <label for="currentPassword" class="form-label" id="current-password-label">Senha Atual</label>
            <input type="password" class="form-control" id="currentPassword" placeholder="Digite sua senha atual" required />
            <i id="toggleCurrentPassword" class="fas fa-eye password-toggle"></i>
          </div>

          <!-- Nova Senha -->
          <div class="mb-3 position-relative">
            <label for="newPassword" class="form-label" id="new-password-label">Nova Senha</label>
            <input type="password" class="form-control" id="newPassword" placeholder="Digite sua nova senha" required />
            <i id="toggleNewPassword" class="fas fa-eye password-toggle"></i>
            
            <!-- Medidor de Força da Senha -->
            <div class="password-strength" id="passwordStrength">
              <div class="strength-bar">
                <div class="strength-bar-fill" id="strengthBarFill"></div>
              </div>
              <div class="strength-text">
                <span class="status" id="strengthStatus">Força da senha</span>
                <span class="score" id="strengthScore">0/8</span>
              </div>
              <div class="strength-requirements" id="strengthRequirements">
                <span class="requirement" id="reqLength"><i class="fas fa-circle"></i> 8+ caracteres</span>
                <span class="requirement" id="reqLowercase"><i class="fas fa-circle"></i> Letra minúscula</span>
                <span class="requirement" id="reqUppercase"><i class="fas fa-circle"></i> Letra maiúscula</span>
                <span class="requirement" id="reqNumber"><i class="fas fa-circle"></i> Número</span>
                <span class="requirement" id="reqSpecial"><i class="fas fa-circle"></i> Caractere especial</span>
              </div>
            </div>
          </div>

          <!-- Confirmar Nova Senha -->
          <div class="mb-3 position-relative">
            <label for="confirmPassword" class="form-label" id="confirm-password-label">Confirmar Nova Senha</label>
            <input type="password" class="form-control" id="confirmPassword" placeholder="Confirme sua nova senha" required />
            <i id="toggleConfirmPassword" class="fas fa-eye password-toggle"></i>
          </div>

          <div class="captcha-container">
            <input type="checkbox" id="captcha" required />
            <label for="captcha" id="captcha-label">Não sou um robô</label>
          </div>

          <button type="submit" class="btn btn-primary btn-login mb-3">
            <i class="fas fa-save"></i> <span id="change-password-button-text">ALTERAR SENHA</span>
          </button>

          <div class="links-section">
            <a href="login.html"><i class="fas fa-arrow-left"></i> <span id="back-to-login-text">Voltar ao Login</span></a>
            <a href="ajuda.html"><i class="fas fa-question-circle"></i> <span id="help-text">Ajuda</span></a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Cursor personalizado -->
  <div class="custom-cursor">
    <div class="ring"></div>
    <div class="dot"></div>
  </div>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // Dicionário de traduções
      const translations = {
        pt: {
          'current-password': 'Senha Atual',
          'new-password': 'Nova Senha',
          'confirm-password': 'Confirmar Nova Senha',
          'current-placeholder': 'Digite sua senha atual',
          'new-placeholder': 'Digite sua nova senha',
          'confirm-placeholder': 'Confirme sua nova senha',
          captcha: 'Não sou um robô',
          'change-password': 'ALTERAR SENHA',
          'back-to-login': 'Voltar ao Login',
          help: 'Ajuda',
          'strength-weak': 'Fraca',
          'strength-medium': 'Média',
          'strength-strong': 'Forte',
          'strength-very-strong': 'Muito Forte',
          'strength-default': 'Força da senha'
        },
        es: {
          'current-password': 'Contraseña Actual',
          'new-password': 'Nueva Contraseña',
          'confirm-password': 'Confirmar Nueva Contraseña',
          'current-placeholder': 'Digite su contraseña actual',
          'new-placeholder': 'Digite su nueva contraseña',
          'confirm-placeholder': 'Confirme su nueva contraseña',
          captcha: 'No soy un robot',
          'change-password': 'CAMBIAR CONTRASEÑA',
          'back-to-login': 'Volver al Login',
          help: 'Ayuda',
          'strength-weak': 'Débil',
          'strength-medium': 'Media',
          'strength-strong': 'Fuerte',
          'strength-very-strong': 'Muy Fuerte',
          'strength-default': 'Fortaleza de la contraseña'
        },
        en: {
          'current-password': 'Current Password',
          'new-password': 'New Password',
          'confirm-password': 'Confirm New Password',
          'current-placeholder': 'Enter your current password',
          'new-placeholder': 'Enter your new password',
          'confirm-placeholder': 'Confirm your new password',
          captcha: 'I am not a robot',
          'change-password': 'CHANGE PASSWORD',
          'back-to-login': 'Back to Login',
          help: 'Help',
          'strength-weak': 'Weak',
          'strength-medium': 'Medium',
          'strength-strong': 'Strong',
          'strength-very-strong': 'Very Strong',
          'strength-default': 'Password strength'
        }
      };

      // Função para aplicar tradução
      function applyLanguage(lang) {
        const t = translations[lang];
        if (!t) return;

        document.getElementById('current-password-label').textContent = t['current-password'];
        document.getElementById('new-password-label').textContent = t['new-password'];
        document.getElementById('confirm-password-label').textContent = t['confirm-password'];
        document.getElementById('currentPassword').placeholder = t['current-placeholder'];
        document.getElementById('newPassword').placeholder = t['new-placeholder'];
        document.getElementById('confirmPassword').placeholder = t['confirm-placeholder'];
        document.getElementById('captcha-label').textContent = t.captcha;
        document.getElementById('change-password-button-text').textContent = t['change-password'];
        document.getElementById('back-to-login-text').textContent = t['back-to-login'];
        document.getElementById('help-text').textContent = t.help;
      }

      // ============================
      // MEDIDOR DE FORÇA DA SENHA
      // ============================
      const newPassword = document.getElementById('newPassword');
      const strengthBarFill = document.getElementById('strengthBarFill');
      const strengthStatus = document.getElementById('strengthStatus');
      const strengthScore = document.getElementById('strengthScore');

      const reqLength = document.getElementById('reqLength');
      const reqLowercase = document.getElementById('reqLowercase');
      const reqUppercase = document.getElementById('reqUppercase');
      const reqNumber = document.getElementById('reqNumber');
      const reqSpecial = document.getElementById('reqSpecial');

      // Mapeamento de requisitos
      const requirements = {
        length: { element: reqLength, met: false, test: (p) => p.length >= 8 },
        lowercase: { element: reqLowercase, met: false, test: (p) => /[a-z]/.test(p) },
        uppercase: { element: reqUppercase, met: false, test: (p) => /[A-Z]/.test(p) },
        number: { element: reqNumber, met: false, test: (p) => /[0-9]/.test(p) },
        special: { element: reqSpecial, met: false, test: (p) => /[^a-zA-Z0-9]/.test(p) }
      };

      // Atualizar medidor
      function updateStrength(password) {
        // Testar cada requisito
        let metCount = 0;
        for (const [key, req] of Object.entries(requirements)) {
          req.met = req.test(password);
          if (req.met) {
            req.element.classList.add('met');
            req.element.querySelector('i').className = 'fas fa-check-circle';
            metCount++;
          } else {
            req.element.classList.remove('met');
            req.element.querySelector('i').className = 'fas fa-circle';
          }
        }

        // Atualizar score
        strengthScore.textContent = `${metCount}/5`;

        // Calcular força baseada nos requisitos atendidos
        const container = document.getElementById('passwordStrength');
        // Remover classes anteriores
        container.classList.remove('strength-weak', 'strength-medium', 'strength-strong', 'strength-very-strong');

        let strengthLabel = '';
        if (password.length === 0) {
          strengthBarFill.style.width = '0%';
          strengthStatus.textContent = 'Força da senha';
          strengthStatus.style.color = '';
          return;
        }

        let percentage = 0;
        if (metCount <= 1) {
          strengthLabel = 'Fraca';
          percentage = 20;
          container.classList.add('strength-weak');
        } else if (metCount <= 2) {
          strengthLabel = 'Fraca';
          percentage = 30;
          container.classList.add('strength-weak');
        } else if (metCount <= 3) {
          strengthLabel = 'Média';
          percentage = 55;
          container.classList.add('strength-medium');
        } else if (metCount <= 4) {
          strengthLabel = 'Forte';
          percentage = 75;
          container.classList.add('strength-strong');
        } else if (metCount === 5) {
          strengthLabel = 'Muito Forte';
          percentage = 100;
          container.classList.add('strength-very-strong');
        }

        // Aplicar largura da barra
        strengthBarFill.style.width = `${percentage}%`;
        
        // Atualizar texto do status com tradução
        const currentLang = document.getElementById('language-selector').value;
        const t = translations[currentLang];
        const strengthMap = {
          'Fraca': t['strength-weak'],
          'Média': t['strength-medium'],
          'Forte': t['strength-strong'],
          'Muito Forte': t['strength-very-strong']
        };
        strengthStatus.textContent = strengthMap[strengthLabel] || strengthLabel;
      }

      // Evento de input na nova senha
      newPassword.addEventListener('input', function () {
        updateStrength(this.value);
      });

      // ============================
      // TOGGLES DE SENHA
      // ============================
      function setupPasswordToggle(toggleId, inputId) {
        const toggle = document.getElementById(toggleId);
        const input = document.getElementById(inputId);
        toggle.addEventListener('click', function () {
          const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
          input.setAttribute('type', type);
          this.classList.toggle('fa-eye');
          this.classList.toggle('fa-eye-slash');
        });
      }

      setupPasswordToggle('toggleCurrentPassword', 'currentPassword');
      setupPasswordToggle('toggleNewPassword', 'newPassword');
      setupPasswordToggle('toggleConfirmPassword', 'confirmPassword');

      // ============================
      // SUBMISSÃO DO FORMULÁRIO
      // ============================
      const changePasswordForm = document.getElementById('changePasswordForm');

      changePasswordForm.addEventListener('submit', function (e) {
        e.preventDefault();

        const currentPassword = document.getElementById('currentPassword').value;
        const newPasswordVal = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const captcha = document.getElementById('captcha').checked;

        // Validações
        if (!currentPassword || !newPasswordVal || !confirmPassword || !captcha) {
          alert('Por favor, preencha todos os campos obrigatórios.');
          return;
        }

        if (newPasswordVal !== confirmPassword) {
          alert('As senhas não coincidem. Por favor, verifique.');
          return;
        }

        // Verificar força mínima (pelo menos 3 requisitos atendidos)
        let metCount = 0;
        for (const req of Object.values(requirements)) {
          if (req.met) metCount++;
        }

        if (metCount < 3) {
          alert('Sua senha é muito fraca. Por favor, crie uma senha mais forte atendendo a pelo menos 3 requisitos.');
          return;
        }

        // Simular alteração de senha
        const submitBtn = document.querySelector('.btn-login');
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ALTERANDO...';
        submitBtn.disabled = true;

        setTimeout(() => {
          submitBtn.innerHTML = originalText;
          submitBtn.disabled = false;
          alert('Senha alterada com sucesso!');
          window.location.href = 'login.html';
        }, 1500);
      });

      // ============================
      // SELETOR DE IDIOMA
      // ============================
      const languageSelector = document.getElementById('language-selector');
      languageSelector.addEventListener('change', function () {
        const lang = this.value;
        applyLanguage(lang);
        localStorage.setItem('preferredLanguage', lang);
        // Atualizar o status de força com a nova língua
        updateStrength(document.getElementById('newPassword').value);
      });

      // Carregar idioma preferido
      const savedLanguage = localStorage.getItem('preferredLanguage') || 'pt';
      languageSelector.value = savedLanguage;
      applyLanguage(savedLanguage);

      // ============================
      // LINKS DE NAVEGAÇÃO
      // ============================
      document.getElementById('help').addEventListener('click', function (e) {
        e.preventDefault();
        window.location.href = '/ajuda';
      });

      // ============================
      // CURSOR PERSONALIZADO
      // ============================
      const dot = document.querySelector(".dot");
      const ring = document.querySelector(".ring");
      let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;

      document.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        dot.style.left = `${mouseX}px`;
        dot.style.top = `${mouseY}px`;
      });

      function animateRing() {
        ringX += (mouseX - ringX) * 0.15;
        ringY += (mouseY - ringY) * 0.15;
        ring.style.left = `${ringX}px`;
        ring.style.top = `${ringY}px`;
        requestAnimationFrame(animateRing);
      }

      animateRing();
    });
  </script>
</body>
</html>
