<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema Clínico Materno-Infantil - Login</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Font Awesome para ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      font-family: 'Times New Roman', Times, serif;
    }

    :root {
      --primary-color: #1a6e9a;
      --secondary-color: #4fa3d1;
      --accent-color: #f8f9fa;
      --text-color: #333;
      --light-gray: #f5f5f5;
      --danger-color: #dc3545;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--light-gray);
      color: var(--text-color);
      height: 100vh;
      display: flex;
      align-items: center;
      
      /* IMAGEM DE FUNDO ADICIONADA */
      background-image: url('images/login-sicammi.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    .login-wrapper {
      display: flex;
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
      padding: 20px;
      gap: 20px;
    }

    /* Painel esquerdo - vidro transparente */
    .left-panel {
      flex: 0 0 300px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 10px;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
      min-height: 500px;
    }

    .left-panel img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .left-panel .mensagem {
      color: white;
      text-align: center;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .left-panel .mensagem i {
      font-size: 2rem;
      margin-bottom: 10px;
      display: block;
    }

    .login-container {
      flex: 1;
      margin: 0;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 10px;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .login-header {
      background: rgba(26, 110, 154, 0.9);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      color: white;
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .login-header img {
      height: 60px;
      margin-bottom: 10px;
    }

    .login-body {
      padding: 30px;
    }

    .form-control {
      border-radius: 5px;
      padding: 12px;
      border: 1px solid rgba(221, 221, 221, 0.5);
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }

    .form-control:focus {
      border-color: var(--secondary-color);
      box-shadow: 0 0 0 0.25rem rgba(31, 138, 194, 0.25);
      background: rgba(255, 255, 255, 0.9);
    }

    .btn-login {
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      border: none;
      padding: 12px;
      font-weight: 600;
      width: 100%;
      border-radius: 5px;
      transition: all 0.3s ease;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(26, 110, 154, 0.3);
      background: linear-gradient(135deg, #145a83, #3d8eb8);
    }

    .password-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #777;
    }

    .password-toggle:hover {
      color: var(--primary-color);
    }

    .language-selector {
      position: absolute;
      top: 15px;
      right: 15px;
    }

    .links-section {
      margin-top: 20px;
      text-align: center;
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .links-section a {
      color: var(--primary-color);
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      padding: 5px 10px;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }

    .links-section a:hover {
      text-decoration: underline;
      background: rgba(255, 255, 255, 0.8);
      transform: scale(1.05);
    }

    .captcha-container {
      background: rgba(245, 245, 245, 0.7);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      border: 1px solid rgba(221, 221, 221, 0.3);
    }

    .captcha-container input {
      margin-right: 10px;
    }

    .sso-buttons {
      margin-top: 20px;
    }

    .sso-btn {
      border: 1px solid rgba(221, 221, 221, 0.5);
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border-radius: 5px;
      padding: 8px 15px;
      margin-bottom: 10px;
      width: 100%;
      text-align: left;
      display: flex;
      align-items: center;
      transition: all 0.3s ease;
    }

    .sso-btn:hover {
      background: rgba(255, 255, 255, 0.9);
      transform: translateX(5px);
    }

    .sso-btn img {
      height: 20px;
      margin-right: 10px;
    }

    .biometric-option {
      margin-top: 15px;
      text-align: center;
    }

    .biometric-btn {
      background: none;
      border: none;
      color: var(--primary-color);
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .login-wrapper {
        flex-direction: column;
        padding: 10px;
      }

      .left-panel {
        flex: 0 0 auto;
        min-height: 150px;
        padding: 20px;
        flex-direction: row;
        gap: 20px;
      }

      .left-panel img {
        max-width: 80px;
        margin-bottom: 0;
      }

      .left-panel .mensagem {
        font-size: 0.9rem;
        text-align: left;
      }

      .left-panel .mensagem i {
        font-size: 1.5rem;
        margin-bottom: 5px;
        display: inline-block;
        margin-right: 10px;
      }

      .login-container {
        margin: 0;
      }
    }

    @media (max-width: 576px) {
      .login-container {
        margin: 0;
      }

      .login-body {
        padding: 20px;
      }

      .left-panel {
        flex-direction: column;
        text-align: center;
        min-height: 120px;
      }

      .left-panel .mensagem {
        text-align: center;
      }

      .links-section {
        gap: 10px;
      }
    }

    /* Cursor personalizado com trailing */
    .custom-cursor {
      pointer-events: none;
      z-index: 9999;
    }

    .dot, .ring {
      position: fixed;
      top: 0;
      left: 0;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: red;
      border-radius: 50%;
      z-index: 10000;
    }

    .ring {
      width: 32px;
      height: 32px;
      border: 3px solid red;
      border-radius: 50%;
      z-index: 9999;
      animation: pulse 1.4s infinite ease-out;
    }

    @keyframes pulse {
      0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
      70% {
        transform: translate(-50%, -50%) scale(1.5);
        opacity: 0;
      }
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <!-- Painel esquerdo com imagem -->
    <div class="left-panel">
      <img src="images/log-afrique.png" alt="Sistema Materno-Infantil" />
      <div class="mensagem">
        <i class="fas fa-heartbeat"></i>
        <strong>Lembre-se:</strong><br>
        Cuidar da saúde materno-infantil<br>
        é construir um futuro melhor.
      </div>
    </div>

    <!-- Container de Login -->
    <div class="login-container">
      <div class="login-header">
        <img src="images/materno_infantil_bg.png" alt="Logo do Sistema" class="img-fluid" />
        <h4>Sistema Clínico Materno-Infantil</h4>
      </div>
      <div class="login-body">
        <div class="language-selector">
          <select class="form-select form-select-sm" id="language-selector">
            <option value="pt">🇧🇷 Português</option>
            <option value="es">🇪🇸 Español</option>
            <option value="en">🇬🇧 English</option>
          </select>
        </div>
        <form id="loginForm">
          <div class="mb-3">
            <label for="username" class="form-label" id="username-label">Usuário</label>
            <input type="text" class="form-control" id="username" placeholder="CPF, CRM/COREN ou e-mail institucional" required />
          </div>
          <div class="mb-3 position-relative">
            <label for="password" class="form-label" id="password-label">Senha</label>
            <input type="password" class="form-control" id="password" placeholder="Digite sua senha" required />
            <i id="togglePassword" class="fas fa-eye password-toggle"></i>
          </div>
          <div class="mb-3">
            <label for="profile" class="form-label" id="profile-label">Perfil</label>
            <select class="form-select" id="profile" required>
              <option value="" selected disabled id="profile-default">Selecione seu perfil</option>
              <option value="medico" id="profile-medico">Médico</option>
              <option value="enfermeiro" id="profile-enfermeiro">Enfermeiro</option>
              <option value="tecnico" id="profile-tecnico">Técnico de Enfermagem</option>
              <option value="administrativo" id="profile-administrativo">Administrativo</option>
              <option value="agente" id="profile-agente">Gestor Hospitalar</option>
              <option value="recepcionista" id="profile-recepcionista">Recepcionista e Atendimento</option>
              <option value="directores" id="profile-directores">Gestantes</option>
            </select>
          </div>
          
          <div class="captcha-container">
            <input type="checkbox" id="captcha" required />
            <label for="captcha" id="captcha-label">Não sou um robô</label>
          </div>
          
          <button type="submit" class="btn btn-primary btn-login mb-3">
            <i class="fas fa-sign-in-alt"></i> <span id="login-button-text">ENTRAR</span>
          </button>
          
          <div class="links-section">
            <a href="esqueci-me-senha.html" id="forgotPassword"><i class="fas fa-key"></i> <span id="forgot-password-text">Esqueci minha senha</span></a>
            <a href="criar-conta.html" id="firstAccess"><i class="fas fa-user-plus"></i> <span id="first-access-text">Primeiro acesso?</span></a>
            <a href="ajuda.html" id="help"><i class="fas fa-question-circle"></i> <span id="help-text">Ajuda</span></a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Cursor personalizado -->
  <div class="custom-cursor">
    <div class="ring"></div>
    <div class="dot"></div>
  </div>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // Dicionário de traduções
      const translations = {
        pt: {
          username: 'Usuário',
          password: 'Senha',
          profile: 'Perfil',
          'profile-default': 'Selecione seu perfil',
          'profile-medico': 'Médico',
          'profile-enfermeiro': 'Enfermeiro',
          'profile-tecnico': 'Técnico de Enfermagem',
          'profile-administrativo': 'Administrativo',
          'profile-agente': 'Gestor Hospitalar',
          'profile-recepcionista': 'Recepcionista e Atendimento',
          'profile-directores': 'Gestante',
          captcha: 'Não sou um robô',
          login: 'ENTRAR',
          'forgot-password': 'Esqueci minha senha',
          'first-access': 'Primeiro acesso?',
          help: 'Ajuda',
          'username-placeholder': 'CPF, CRM/COREN ou e-mail institucional',
          'password-placeholder': 'Digite sua senha'
        },
        es: {
          username: 'Usuario',
          password: 'Contraseña',
          profile: 'Perfil',
          'profile-default': 'Seleccione su perfil',
          'profile-medico': 'Médico',
          'profile-enfermeiro': 'Enfermero',
          'profile-tecnico': 'Técnico de Enfermería',
          'profile-administrativo': 'Administrativo',
          'profile-agente': 'Gestor Hospitalario',
          'profile-recepcionista': 'Recepcionista y Atención',
          'profile-directores': 'Mujer Embarazada',
          captcha: 'No soy un robot',
          login: 'INGRESAR',
          'forgot-password': 'Olvidé mi contraseña',
          'first-access': '¿Primer acceso?',
          help: 'Ayuda',
          'username-placeholder': 'CPF, CRM/COREN o correo institucional',
          'password-placeholder': 'Digite su contraseña'
        },
        en: {
          username: 'Username',
          password: 'Password',
          profile: 'Profile',
          'profile-default': 'Select your profile',
          'profile-medico': 'Doctor',
          'profile-enfermeiro': 'Nurse',
          'profile-tecnico': 'Nursing Technician',
          'profile-administrativo': 'Administrative',
          'profile-agente': 'Hospital Manager',
          'profile-recepcionista': 'Receptionist and Service',
          'profile-directores': 'Pregnant Woman',
          captcha: 'I am not a robot',
          login: 'LOGIN',
          'forgot-password': 'Forgot password',
          'first-access': 'First access?',
          help: 'Help',
          'username-placeholder': 'CPF, CRM/COREN or institutional email',
          'password-placeholder': 'Enter your password'
        }
      };

      // Função para aplicar tradução
      function applyLanguage(lang) {
        const t = translations[lang];
        if (!t) return;

        document.getElementById('username-label').textContent = t.username;
        document.getElementById('password-label').textContent = t.password;
        document.getElementById('profile-label').textContent = t.profile;
        document.getElementById('profile-default').textContent = t['profile-default'];
        document.getElementById('profile-medico').textContent = t['profile-medico'];
        document.getElementById('profile-enfermeiro').textContent = t['profile-enfermeiro'];
        document.getElementById('profile-tecnico').textContent = t['profile-tecnico'];
        document.getElementById('profile-administrativo').textContent = t['profile-administrativo'];
        document.getElementById('profile-agente').textContent = t['profile-agente'];
        document.getElementById('profile-recepcionista').textContent = t['profile-recepcionista'];
        document.getElementById('profile-directores').textContent = t['profile-directores'];
        document.getElementById('captcha-label').textContent = t.captcha;
        document.getElementById('login-button-text').textContent = t.login;
        document.getElementById('forgot-password-text').textContent = t['forgot-password'];
        document.getElementById('first-access-text').textContent = t['first-access'];
        document.getElementById('help-text').textContent = t.help;
        
        // Atualizar placeholders
        document.getElementById('username').placeholder = t['username-placeholder'];
        document.getElementById('password').placeholder = t['password-placeholder'];
      }

      // Configuração do toggle de senha
      const togglePassword = document.querySelector('#togglePassword');
      const password = document.querySelector('#password');
      
      togglePassword.addEventListener('click', function () {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
      });

      const loginForm = document.getElementById('loginForm');

      // Mapeamento de rotas por perfil
      const profileRoutes = {
        medico: 'medico/menumedico.html',
        enfermeiro: 'enfermeiro/menuenfermeiro.html',
        tecnico: 'tecnico/menutec.html',
        administrativo: 'administrativo/menuadmin.html',
        agente: 'gestor/menu_gestor.html',
        recepcionista: 'recepcionista/menu_recepcionista.html',
        directores: 'gestante/menu_gestante.html'
      };

      // Mapeamento de permissões por perfil
      const profilePermissions = {
        medico: ['visualizar_pacientes', 'prescrever_medicamentos', 'solicitar_exames'],
        enfermeiro: ['visualizar_pacientes', 'registrar_procedimentos', 'aplicar_medicamentos'],
        tecnico: ['auxiliar_procedimentos', 'registrar_sinais_vitais'],
        administrativo: ['gerenciar_documentos', 'agendar_consultas'],
        agente: ['registrar_vacinacoes', 'gerar_certificados'],
        recepcionista: ['agendar_consultas', 'cadastrar_pacientes'],
        directores: ['visualizar_todos_dados', 'gerenciar_usuarios']
      };

      // Função para autenticar usuário
      async function authenticateUser(username, password, profile) {
        try {
          return new Promise(resolve => {
            setTimeout(() => {
              resolve({
                success: true,
                user: {
                  name: "Usuário Teste",
                  email: username,
                  profile: profile,
                  permissions: profilePermissions[profile] || []
                }
              });
            }, 1000);
          });
        } catch (error) {
          console.error('Erro na autenticação:', error);
          return { success: false, message: 'Erro ao conectar com o servidor' };
        }
      }

      // Submissão do formulário de login
      loginForm.addEventListener('submit', async function (e) {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const passwordVal = document.getElementById('password').value;
        const profileSelect = document.getElementById('profile');
        const profile = profileSelect.value;
        const captcha = document.getElementById('captcha').checked;

        if (!username || !passwordVal || !profile || !captcha) {
          alert('Por favor, preencha todos os campos obrigatórios.');
          return;
        }

        // Mostrar loading
        const loginBtn = document.querySelector('.btn-login');
        const originalBtnText = loginBtn.innerHTML;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> AUTENTICANDO...';
        loginBtn.disabled = true;

        // Autenticar usuário
        const authResult = await authenticateUser(username, passwordVal, profile);
        
        // Restaurar botão
        loginBtn.innerHTML = originalBtnText;
        loginBtn.disabled = false;

        if (authResult.success) {
          // Armazenar dados do usuário na sessão
          sessionStorage.setItem('currentUser', JSON.stringify(authResult.user));
          
          // Redirecionar para a rota específica do perfil
          window.location.href = profileRoutes[profile];
        } else {
          alert(authResult.message || 'Credenciais inválidas. Por favor, tente novamente.');
        }
      });

      // Recuperação de senha - link de redirecionamento
      document.getElementById('forgotPassword').addEventListener('click', function (e) {
        e.preventDefault();
        window.location.href = '/recuperar-senha';
      });

      // Primeiro acesso - link de redirecionamento
      document.getElementById('firstAccess').addEventListener('click', function (e) {
        e.preventDefault();
        window.location.href = '/primeiro-acesso';
      });

      // Ajuda - link de redirecionamento
      document.getElementById('help').addEventListener('click', function (e) {
        e.preventDefault();
        window.location.href = '/ajuda';
      });

      // Seletor de idioma
      const languageSelector = document.getElementById('language-selector');
      languageSelector.addEventListener('change', function () {
        const lang = this.value;
        applyLanguage(lang);
        // Salvar preferência de idioma
        localStorage.setItem('preferredLanguage', lang);
      });

      // Carregar idioma preferido do usuário
      const savedLanguage = localStorage.getItem('preferredLanguage') || 'pt';
      languageSelector.value = savedLanguage;
      applyLanguage(savedLanguage);

      // Cursor com rastro suave
      const dot = document.querySelector(".dot");
      const ring = document.querySelector(".ring");
      let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;

      document.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        dot.style.left = `${mouseX}px`;
        dot.style.top = `${mouseY}px`;
      });

      function animateRing() {
        ringX += (mouseX - ringX) * 0.15;
        ringY += (mouseY - ringY) * 0.15;
        ring.style.left = `${ringX}px`;
        ring.style.top = `${ringY}px`;
        requestAnimationFrame(animateRing);
      }

      animateRing();
    });
  </script>
</body>
</html>
